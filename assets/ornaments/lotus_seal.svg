<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="petal" cx="50%" cy="100%" r="100%" fx="50%" fy="100%">
      <stop offset="0%" stop-color="#FDFAF6"/>
      <stop offset="22%" stop-color="#F5C277"/>
      <stop offset="55%" stop-color="#E8820C"/>
      <stop offset="88%" stop-color="#9C4108"/>
      <stop offset="100%" stop-color="#5A1F0A"/>
    </radialGradient>
    <radialGradient id="innerPetal" cx="50%" cy="100%" r="100%" fx="50%" fy="100%">
      <stop offset="0%" stop-color="#FFE2A0"/>
      <stop offset="55%" stop-color="#C24010"/>
      <stop offset="100%" stop-color="#5A1F0A"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE680"/>
      <stop offset="55%" stop-color="#D4A437"/>
      <stop offset="100%" stop-color="#8B6610"/>
    </linearGradient>
    <radialGradient id="bindu" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#C24010"/>
      <stop offset="60%" stop-color="#8B0000"/>
      <stop offset="100%" stop-color="#3A0805"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8820C" stop-opacity="0.18"/>
      <stop offset="65%" stop-color="#E8820C" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#E8820C" stop-opacity="0"/>
    </radialGradient>

    <!-- Petal silhouette: base 0,0 → tip 0,-72 -->
    <path id="p" d="M 0 0 C 14 -4 24 -22 22 -42 C 20 -58 12 -68 0 -72 C -12 -68 -20 -58 -22 -42 C -24 -22 -14 -4 0 0 Z"/>
    <path id="pi" d="M 0 -3 C 9 -8 16 -22 14 -42 C 12 -54 7 -62 0 -66 C -7 -62 -12 -54 -14 -42 C -16 -22 -9 -8 0 -3 Z"/>

    <g id="cluster">
      <use href="#p" fill="#3A0805" opacity="0.30" transform="translate(0.6 1.4)"/>
      <use href="#p" fill="url(#petal)"/>
      <use href="#p" fill="none" stroke="#5A1F0A" stroke-width="0.7" opacity="0.7"/>
      <use href="#pi" fill="url(#innerPetal)" opacity="0.85"/>
      <line x1="0" y1="-12" x2="0" y2="-66" stroke="url(#gold)" stroke-width="0.8" stroke-linecap="round" opacity="0.85"/>
    </g>
  </defs>

  <!-- Halo -->
  <circle cx="100" cy="100" r="98" fill="url(#halo)"/>

  <!-- Outer dashed gold ring -->
  <circle cx="100" cy="100" r="93" fill="none" stroke="url(#gold)" stroke-width="1.6" stroke-dasharray="6 4" opacity="0.85"/>

  <!-- 8 lotus petals -->
  <g transform="translate(100 100)">
    <g transform="rotate(0)"><use href="#cluster" transform="translate(0 -22)"/></g>
    <g transform="rotate(45)"><use href="#cluster" transform="translate(0 -22)"/></g>
    <g transform="rotate(90)"><use href="#cluster" transform="translate(0 -22)"/></g>
    <g transform="rotate(135)"><use href="#cluster" transform="translate(0 -22)"/></g>
    <g transform="rotate(180)"><use href="#cluster" transform="translate(0 -22)"/></g>
    <g transform="rotate(225)"><use href="#cluster" transform="translate(0 -22)"/></g>
    <g transform="rotate(270)"><use href="#cluster" transform="translate(0 -22)"/></g>
    <g transform="rotate(315)"><use href="#cluster" transform="translate(0 -22)"/></g>
  </g>

  <!-- 8 small saffron petals offset between lotus petals -->
  <g transform="translate(100 100)" fill="#E8820C" opacity="0.92">
    <g transform="rotate(22.5)"><path d="M 0 -22 L 6 -38 L 0 -50 L -6 -38 Z"/></g>
    <g transform="rotate(67.5)"><path d="M 0 -22 L 6 -38 L 0 -50 L -6 -38 Z"/></g>
    <g transform="rotate(112.5)"><path d="M 0 -22 L 6 -38 L 0 -50 L -6 -38 Z"/></g>
    <g transform="rotate(157.5)"><path d="M 0 -22 L 6 -38 L 0 -50 L -6 -38 Z"/></g>
    <g transform="rotate(202.5)"><path d="M 0 -22 L 6 -38 L 0 -50 L -6 -38 Z"/></g>
    <g transform="rotate(247.5)"><path d="M 0 -22 L 6 -38 L 0 -50 L -6 -38 Z"/></g>
    <g transform="rotate(292.5)"><path d="M 0 -22 L 6 -38 L 0 -50 L -6 -38 Z"/></g>
    <g transform="rotate(337.5)"><path d="M 0 -22 L 6 -38 L 0 -50 L -6 -38 Z"/></g>
  </g>

  <!-- Inner gold band -->
  <circle cx="100" cy="100" r="22" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.95"/>
  <circle cx="100" cy="100" r="22" fill="none" stroke="#5A3A0F" stroke-width="0.4" opacity="0.55"/>
  <circle cx="100" cy="100" r="26" fill="none" stroke="#8B0000" stroke-width="0.6" opacity="0.7"/>

  <!-- 8 gold dots on inner gold band -->
  <g transform="translate(100 100)" fill="#FFE680">
    <circle cx="0" cy="-22" r="0.9"/>
    <circle cx="0" cy="-22" r="0.9" transform="rotate(45)"/>
    <circle cx="0" cy="-22" r="0.9" transform="rotate(90)"/>
    <circle cx="0" cy="-22" r="0.9" transform="rotate(135)"/>
    <circle cx="0" cy="-22" r="0.9" transform="rotate(180)"/>
    <circle cx="0" cy="-22" r="0.9" transform="rotate(225)"/>
    <circle cx="0" cy="-22" r="0.9" transform="rotate(270)"/>
    <circle cx="0" cy="-22" r="0.9" transform="rotate(315)"/>
  </g>

  <!-- Bindu (deep-red sacred center dot, gold rim) -->
  <circle cx="100" cy="100" r="12" fill="url(#bindu)"/>
  <circle cx="100" cy="100" r="12" fill="none" stroke="url(#gold)" stroke-width="1.0" opacity="0.95"/>
  <circle cx="96" cy="96" r="2.4" fill="#FFE680" opacity="0.7"/>
</svg>
